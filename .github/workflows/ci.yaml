name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git clang-format python3-dev

      - name: Check code format
        run: |
          find . -name "*.cpp" -o -name "*.h" | grep -v "deps/" | xargs clang-format --dry-run --Werror

      - name: Build
        run: |
          ./build.sh Release

      - name: Run
        run: |
          export PYTHONPATH="$PYTHONPATH:$(pwd)/build/python"
          python3 -m pip install numpy
          python3 ./python/example.py
